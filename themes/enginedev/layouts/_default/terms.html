{{ define "main" }}
<div class="container">
  <h1 class="section-title">{{ .Title }}</h1>
  <div class="tags" style="padding: 2rem 0;">
    {{ range .Pages }}
      <a href="{{ .Permalink }}" class="tag" style="font-size: 1rem; padding: 0.5rem 1.25rem;">
        {{ .Title }} ({{ .Pages.Len }})
      </a>
    {{ end }}
  </div>
</div>
{{ end }}

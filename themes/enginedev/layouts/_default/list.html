{{ define "main" }}
<div class="container">
  <h1 class="section-title">{{ .Title }}</h1>
  <div class="card-grid">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="card" style="color:inherit">
      <div class="meta">{{ .Date.Format "Jan 2, 2006" }}</div>
      <h2>{{ .Title }}</h2>
      <p>{{ .Summary | truncate 120 }}</p>
      <div class="tags">
        {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
